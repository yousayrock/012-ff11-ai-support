<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>012 FF11 ミア</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background:transparent !important;
  background-color:rgba(0,0,0,0) !important;
  width:100%; height:100%; overflow:hidden;
  font-family:'Meiryo','Yu Gothic UI','Noto Sans JP',sans-serif;
}

/* ══════════════════════════════════════════════════
   字幕テロップバー — 独立・ドラッグ可
══════════════════════════════════════════════════ */
#telop-bar {
  position:fixed;
  width:76%;
  padding:0 0 10px 0;
  background:rgba(8,4,1,0.72);
  border-radius:10px;
  text-align:center;
  opacity:0;
  transition:opacity 0.35s ease;
  z-index:900;
  border:1px solid rgba(200,150,42,0.3);
  box-shadow:0 4px 24px rgba(0,0,0,0.55);
  min-width:220px;
  cursor:default;
}
#telop-bar.show { opacity:1; }

#telop-grip {
  height:14px; cursor:grab; display:flex;
  align-items:center; justify-content:center; padding-top:4px;
}
#telop-grip:active { cursor:grabbing; }
#telop-grip::before {
  content:''; width:32px; height:3px;
  background:rgba(200,150,42,0.5); border-radius:2px;
}

#telop-inner {
  color:#fff8e8; font-size:19px; line-height:1.75;
  text-shadow:0 0 10px rgba(0,0,0,0.95), 2px 2px 6px rgba(0,0,0,0.95);
  letter-spacing:0.05em; white-space:pre-wrap; word-break:break-all;
  min-height:1.75em; padding:0 24px;
  transition:opacity 0.25s ease;
}
#telop-inner.fade { opacity:0; }

/* ══════════════════════════════════════════════════
   チャットパネル — 独立・ドラッグ可
══════════════════════════════════════════════════ */
#panel {
  position:fixed;
  width:280px;
  background:rgba(255,248,230,0.97);
  border:2px solid #c8962a; border-radius:16px;
  overflow:hidden;
  max-height:0; opacity:0;
  transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease;
  box-shadow:0 4px 16px rgba(180,120,20,0.18);
  z-index:1000;
  transform-origin:top left;
}
#panel.open { max-height:440px; opacity:1; }

/* パネルヘッダー（ドラッグハンドル） */
#panel-header {
  display:flex; align-items:center; gap:6px;
  padding:8px 12px; border-bottom:1px solid rgba(180,120,20,0.2);
  background:rgba(200,150,42,0.12);
  cursor:grab; user-select:none;
}
#panel-header:active { cursor:grabbing; }
#panel-header .title { font-size:10px; color:#8a6010; letter-spacing:1.5px; font-weight:bold; }

#mic-dot {
  width:7px; height:7px; background:rgba(180,120,20,0.25);
  border-radius:50%; transition:background 0.2s; flex-shrink:0;
}
#mic-dot.active   { background:#c8962a; box-shadow:0 0 5px rgba(200,150,42,0.6); }
#mic-dot.recording{ background:#e04040; animation:mpulse 0.6s infinite; }
@keyframes mpulse { 0%,100%{opacity:0.6;} 50%{opacity:1;} }

#panel-close {
  margin-left:auto; font-size:12px; color:rgba(100,70,20,0.5);
  cursor:pointer; padding:2px 4px; flex-shrink:0;
}
#panel-close:hover { color:#c8962a; }

/* 自動クローズバー */
#auto-close-bar { height:2px; background:rgba(200,150,42,0.15); }
#auto-close-progress {
  height:100%; width:100%;
  background:linear-gradient(90deg,#c8962a,#e8b840);
  transform-origin:left; transition:transform linear;
}

/* タブ */
#panel-tabs {
  display:flex; border-bottom:1px solid rgba(180,120,20,0.18);
  background:rgba(200,150,42,0.06);
}
.tab-btn {
  flex:1; padding:5px 4px; font-size:10px; color:#8a6010;
  background:none; border:none; border-bottom:2px solid transparent;
  cursor:pointer; letter-spacing:0.8px; font-weight:bold;
  font-family:inherit; transition:background 0.15s, border-color 0.15s;
}
.tab-btn:hover { background:rgba(200,150,42,0.1); }
.tab-btn.active {
  background:rgba(200,150,42,0.18); border-bottom-color:#c8962a; color:#7a4e00;
}

/* タブコンテンツ */
.tab-content { display:none; flex-direction:column; }
.tab-content.active { display:flex; }

#chat-log {
  height:210px; overflow-y:auto; padding:8px 10px;
  display:flex; flex-direction:column; gap:6px;
}
#chat-log::-webkit-scrollbar { width:3px; }
#chat-log::-webkit-scrollbar-thumb { background:rgba(180,120,20,0.25); border-radius:2px; }

.msg-user {
  align-self:flex-end; max-width:85%;
  background:rgba(200,150,42,0.15); border:1px solid rgba(180,120,20,0.25);
  border-radius:12px 12px 2px 12px; padding:5px 10px;
  font-size:11px; color:#5a3a0a; white-space:pre-wrap; word-break:break-all;
}
.msg-mippi {
  align-self:flex-start; max-width:92%;
  background:rgba(255,255,255,0.7); border:1px solid rgba(180,120,20,0.2);
  border-radius:12px 12px 12px 2px; padding:6px 10px;
  font-size:11px; color:#3a2a1a; white-space:pre-wrap; word-break:break-all; line-height:1.7;
}
.msg-mippi.diagram { font-family:'Consolas','Courier New',monospace; font-size:10px; }

#input-area {
  display:flex; gap:5px; padding:6px 10px;
  border-top:1px solid rgba(180,120,20,0.15); align-items:center;
}
#text-input {
  flex:1; background:rgba(255,255,255,0.8);
  border:1px solid rgba(180,120,20,0.3); border-radius:16px;
  padding:5px 10px; font-size:11px; color:#3a2a1a;
  font-family:inherit; outline:none;
}
#text-input:focus { border-color:#c8962a; box-shadow:0 0 0 2px rgba(200,150,42,0.15); }
#text-input::placeholder { color:rgba(100,70,20,0.4); }
#send-btn {
  width:28px; height:28px; background:rgba(200,150,42,0.2);
  border:1.5px solid #c8962a; border-radius:50%;
  color:#8a6010; font-size:12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
#send-btn:hover { background:rgba(200,150,42,0.4); }
#mic-btn {
  width:28px; height:28px; background:rgba(200,150,42,0.15);
  border:1.5px solid #c8962a; border-radius:50%;
  color:#8a6010; font-size:13px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  user-select:none; -webkit-user-select:none; transition:background 0.15s;
}
#mic-btn:hover { background:rgba(200,150,42,0.35); }
#mic-btn.recording {
  background:rgba(224,64,64,0.85); border-color:#e04040;
  color:#fff; box-shadow:0 0 7px rgba(224,64,64,0.7);
  animation:mpulse 0.6s infinite;
}
#mic-btn.processing {
  background:rgba(200,150,42,0.5); animation:mpulse 0.7s infinite;
}

/* モード切り替えバー（チャットパネル内） */
#mode-bar {
  display:flex; gap:4px; padding:5px 10px 4px;
  border-bottom:1px solid rgba(180,120,20,0.15);
  background:rgba(200,150,42,0.04);
}
.mode-btn {
  flex:1; padding:3px 2px; font-size:11px; border-radius:8px;
  border:1.5px solid transparent; background:none; cursor:pointer;
  color:#8a6010; font-family:inherit; letter-spacing:0.5px;
  transition:background 0.15s, border-color 0.15s;
}
.mode-btn:hover { background:rgba(200,150,42,0.12); }
.mode-btn.active {
  background:rgba(200,150,42,0.22); border-color:#c8962a; color:#6a3e00; font-weight:bold;
}

/* チャットパネル内 波形（小） */
#waveform {
  display:none; align-items:center; justify-content:center;
  gap:3px; height:36px; padding:0 10px;
  border-top:1px solid rgba(180,120,20,0.15);
}
#waveform.show { display:flex; }
.wv {
  width:3px; background:#e04040; border-radius:3px; height:4px;
  animation:wvani 0.7s ease-in-out infinite;
}
.wv:nth-child(1){animation-delay:0s;}   .wv:nth-child(2){animation-delay:0.08s;}
.wv:nth-child(3){animation-delay:0.16s;} .wv:nth-child(4){animation-delay:0.24s;}
.wv:nth-child(5){animation-delay:0.32s;} .wv:nth-child(6){animation-delay:0.40s;}
.wv:nth-child(7){animation-delay:0.48s;} .wv:nth-child(8){animation-delay:0.56s;}
.wv:nth-child(9){animation-delay:0.40s;} .wv:nth-child(10){animation-delay:0.32s;}
.wv:nth-child(11){animation-delay:0.24s;}.wv:nth-child(12){animation-delay:0.16s;}
@keyframes wvani { 0%,100%{height:3px;opacity:0.5;} 50%{height:22px;opacity:1;} }
#waveform.processing .wv { background:#c8962a; animation:wvani 1.2s ease-in-out infinite; }

/* ══ ボイスUI（PTT/ボイスモード専用オーバーレイ） ══ */
#voice-ui {
  display:none;
  position:fixed;
  flex-direction:column; align-items:center; gap:10px;
  z-index:1100;
}
#voice-ui.show { display:flex; }

/* グリップ（ドラッグハンドル） */
#voice-grip {
  width:60px; height:16px; cursor:grab;
  display:flex; align-items:center; justify-content:center;
}
#voice-grip:active { cursor:grabbing; }
#voice-grip::before {
  content:''; width:36px; height:3px;
  background:rgba(200,150,42,0.4); border-radius:2px;
}

/* 大きな録音ボタン */
#big-mic-btn {
  width:88px; height:88px; border-radius:50%;
  background:rgba(30,18,4,0.82);
  border:2.5px solid rgba(200,150,42,0.6);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; cursor:pointer; user-select:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
  transition:background 0.15s, border-color 0.15s, transform 0.1s;
}
#big-mic-btn:hover { background:rgba(50,30,6,0.9); border-color:#c8962a; }
#big-mic-btn:active { transform:scale(0.94); }
#big-mic-btn.recording {
  background:rgba(180,30,30,0.9); border-color:#e04040;
  box-shadow:0 0 20px rgba(224,64,64,0.6);
  animation:mpulse 0.7s infinite;
}
#big-mic-btn.processing {
  background:rgba(140,100,10,0.85); border-color:#e8b840;
  animation:mpulse 1.0s infinite;
}
#big-mic-icon { font-size:30px; line-height:1; }
#big-mic-label { font-size:9px; color:rgba(220,180,80,0.85); letter-spacing:1px; }

/* 大ボタン下の波形 */
#big-waveform {
  display:flex; gap:3px; align-items:center;
  height:28px; opacity:0; transition:opacity 0.3s;
}
#big-waveform.show { opacity:1; }
.bwv {
  width:4px; background:#e04040; border-radius:3px; height:3px;
  animation:wvani 0.7s ease-in-out infinite;
}
.bwv:nth-child(1){animation-delay:0s;}  .bwv:nth-child(2){animation-delay:0.1s;}
.bwv:nth-child(3){animation-delay:0.2s;} .bwv:nth-child(4){animation-delay:0.3s;}
.bwv:nth-child(5){animation-delay:0.4s;} .bwv:nth-child(6){animation-delay:0.3s;}
.bwv:nth-child(7){animation-delay:0.2s;} .bwv:nth-child(8){animation-delay:0.1s;}
#big-waveform.processing .bwv { background:#e8b840; animation:wvani 1.2s ease-in-out infinite; }

/* マイクデバイス選択 */
#mic-select-btn {
  position:absolute; top:4px; right:6px;
  width:20px; height:20px; border-radius:50%;
  background:rgba(200,150,42,0.1); border:1px solid rgba(200,150,42,0.25);
  color:rgba(200,150,42,0.6); font-size:12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.15s;
}
#mic-select-btn:hover { background:rgba(200,150,42,0.3); color:#c8962a; }
#mic-device-menu {
  display:none; position:absolute; top:28px; right:0;
  background:rgba(18,10,2,0.97); border:1px solid rgba(200,150,42,0.4);
  border-radius:8px; padding:4px; min-width:200px; max-width:280px;
  z-index:1300; box-shadow:0 4px 16px rgba(0,0,0,0.6);
}
#mic-device-menu.show { display:block; }
.mic-device-item {
  padding:6px 10px; cursor:pointer; border-radius:5px;
  color:rgba(220,180,80,0.8); font-size:11px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  transition:background 0.1s;
}
.mic-device-item:hover { background:rgba(200,150,42,0.2); }
.mic-device-item.active { color:#c8962a; }
.mic-device-item.active::before { content:'✓ '; }

/* モード表示ラベル＆チャット切り替えボタン */
#voice-info {
  display:flex; flex-direction:column; align-items:center; gap:5px;
}
#voice-mode-label {
  font-size:9px; color:rgba(200,150,42,0.7); letter-spacing:1.5px;
  text-shadow:0 1px 4px rgba(0,0,0,0.8);
}
#voice-to-chat {
  font-size:9px; color:rgba(180,130,40,0.6); cursor:pointer;
  background:rgba(0,0,0,0.4); border:1px solid rgba(200,150,42,0.3);
  border-radius:10px; padding:2px 10px; letter-spacing:0.8px;
  transition:background 0.15s, color 0.15s;
}
#voice-to-chat:hover { background:rgba(200,150,42,0.2); color:#c8962a; }

/* メモタブ */
#memo-area {
  flex:1; min-height:240px; resize:none;
  background:rgba(255,255,255,0.6);
  border:none; border-top:1px solid rgba(180,120,20,0.1);
  padding:8px 10px; font-size:11px; color:#3a2a1a;
  font-family:inherit; outline:none; line-height:1.7;
}
#memo-area::placeholder { color:rgba(120,80,20,0.4); }

/* ══════════════════════════════════════════════════
   ミアコンテナ — 右下固定（窓ごと移動）
══════════════════════════════════════════════════ */
#container {
  position:fixed; bottom:12px; right:12px;
  width:280px;
  display:flex; flex-direction:column; align-items:center;
  z-index:1000;
}

#resize-handle {
  position:absolute; left:-5px; top:0; bottom:0; width:10px;
  cursor:ew-resize; z-index:200;
  border-left:2px solid transparent; transition:border-color 0.15s;
}
#resize-handle:hover { border-left-color:rgba(200,150,42,0.5); }

#main-area { position:relative; width:100%; height:290px; flex-shrink:0; }

.cat-area {
  position:absolute; bottom:0; left:0; right:0;
  display:flex; justify-content:center;
  animation:float 5s ease-in-out infinite;
  cursor:grab; user-select:none;
}
.cat-area:active { cursor:grabbing; }
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
.wrap { animation:sway 4.5s ease-in-out infinite; transform-origin:center bottom; }
.wrap.talking { animation:tsway 0.6s ease-in-out infinite; }
@keyframes sway {
  0%,100%{transform:rotate(0deg) translateY(0);}
  30%{transform:rotate(3deg) translateY(-8px);} 70%{transform:rotate(-3deg) translateY(-6px);}
}
@keyframes tsway {
  0%,100%{transform:rotate(0deg) translateY(0);}
  33%{transform:rotate(4deg) translateY(-10px);} 66%{transform:rotate(-4deg) translateY(-8px);}
}
</style>
</head>
<body>

<!-- ── 字幕テロップバー ── -->
<div id="telop-bar">
  <div id="telop-grip"></div>
  <div id="telop-inner"></div>
</div>

<!-- ── チャットパネル ── -->
<div id="panel">
  <div id="panel-header">
    <span class="title">◈ FF11 MIA</span>
    <div id="mic-dot"></div>
    <span id="panel-close" onclick="closePanel()">✕</span>
  </div>
  <div id="auto-close-bar"><div id="auto-close-progress"></div></div>
  <div id="mode-bar">
    <button class="mode-btn active" id="mode-chat"  onclick="setMode('chat')">💬 チャット</button>
    <button class="mode-btn"        id="mode-ptt"   onclick="setMode('ptt')">🎤 PTT</button>
    <button class="mode-btn"        id="mode-voice" onclick="setMode('voice')">🎙️ ボイス</button>
  </div>
  <div id="panel-tabs">
    <button class="tab-btn active" onclick="switchTab('chat')">会話</button>
    <button class="tab-btn"        onclick="switchTab('memo')">📝 メモ</button>
  </div>
  <div id="tab-chat" class="tab-content active">
    <div id="chat-log"></div>
    <div id="waveform">
      <div class="wv"></div><div class="wv"></div><div class="wv"></div>
      <div class="wv"></div><div class="wv"></div><div class="wv"></div>
      <div class="wv"></div><div class="wv"></div><div class="wv"></div>
      <div class="wv"></div><div class="wv"></div><div class="wv"></div>
    </div>
    <div id="input-area">
      <input id="text-input" type="text" placeholder="FF11について何でも...">
      <div id="mic-btn">🎤</div>
      <div id="send-btn" onclick="sendText()">▶</div>
    </div>
  </div>
  <div id="tab-memo" class="tab-content">
    <textarea id="memo-area" placeholder="FF11メモをここに書いておこう…"></textarea>
  </div>
</div>

<!-- ── ボイスUI（PTT/ボイスモード） ── -->
<div id="voice-ui">
  <div id="voice-grip"></div>
  <button id="mic-select-btn" title="マイク選択">⚙</button>
  <div id="mic-device-menu"></div>
  <div id="big-waveform">
    <div class="bwv"></div><div class="bwv"></div><div class="bwv"></div>
    <div class="bwv"></div><div class="bwv"></div><div class="bwv"></div>
    <div class="bwv"></div><div class="bwv"></div>
  </div>
  <div id="big-mic-btn">
    <div id="big-mic-icon">🎤</div>
    <div id="big-mic-label">TAP</div>
  </div>
  <div id="voice-info">
    <div id="voice-mode-label">VOICE MODE</div>
    <div id="voice-to-chat" onclick="setMode('chat')">💬 チャットを見る</div>
  </div>
</div>

<!-- ── ミアキャラクター ── -->
<div id="container">
  <div id="resize-handle"></div>
  <div id="main-area">
    <div class="cat-area" id="cat-area">
      <div class="wrap" id="wrap">
        <img id="mippi-img" src="/mia/11_yasumi.png" width="270" height="270" style="display:block;object-fit:contain;">
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
//  スタンプ
// ══════════════════════════════════════════════════
const mippiImg = document.getElementById('mippi-img');
const wrap     = document.getElementById('wrap');
let stampTimer = null, isTalking = false;

const STAMPS = {
  ohayou:'01_ohayou.png', yeah:'02_yeah.png', arigatou:'03_arigatou.png',
  iine:'04_iine.png', gomen:'05_gomen.png', ganbaru:'06_ganbaru.png',
  ikou:'07_ikou.png', nani:'08_nani.png', daisuki:'09_daisuki.png',
  etto:'10_etto.png', yasumi:'11_yasumi.png', oyasumi:'12_oyasumi.png',
  fight:'13_fight.png', doya:'14_doya.png', yay:'15_yay.png', matane:'16_matane.png'
};

const IDLE_STAMPS = ['yasumi','iine','doya','fight','ganbaru','ikou'];
function randomIdleStamp() {
  return STAMPS[IDLE_STAMPS[Math.floor(Math.random() * IDLE_STAMPS.length)]];
}

function setStamp(key, duration) {
  mippiImg.src = '/mia/' + (STAMPS[key] || STAMPS.yasumi);
  if (stampTimer) clearTimeout(stampTimer);
  if (duration) stampTimer = setTimeout(()=>{
    if (!isTalking) mippiImg.src = '/mia/' + randomIdleStamp();
  }, duration);
}

function autoStamp(t) {
  if (/おはよう|こんにちは|はじめまして|よろしく|いらっしゃ/.test(t)) setStamp('ohayou', 2500);
  else if (/さようなら|またね|バイバイ|またあした|またきて/.test(t)) setStamp('matane', 3000);
  else if (/おやすみ/.test(t)) setStamp('oyasumi', 3000);
  else if (/危ない|えっ|びっくり|散開|マジ！|うそ！|まじか|嘘で/.test(t)) setStamp('etto', 2000);
  else if (/調べ|検索|ちょっと待|確認|なんだっけ|忘れ|うーん|わからん|どうだっけ/.test(t)) setStamp('nani', 4000);
  else if (/やった|最高|やばい|すごい|ばっちり|わーい|できた|完璧|クリア|勝っ/.test(t)) setStamp('yay', 2500);
  else if (/いえーい|ヤッホー|テンション|ノリノリ/.test(t)) setStamp('yeah', 2000);
  else if (/ごめん|すまな|申し訳|ごめんね|失敗/.test(t)) setStamp('gomen', 2500);
  else if (/ありがと|感謝|助かっ/.test(t)) setStamp('arigatou', 2500);
  else if (/好き|かわい|だいすき|ゆっぴ|愛し/.test(t)) setStamp('daisuki', 2500);
  else if (/なるほど|ドヤ|正解|さすが|ぴったり|その通り/.test(t)) setStamp('doya', 2000);
  else if (/頑張|ファイト|いける|諦めないで|応援|一緒に戦/.test(t)) setStamp('fight', 2500);
  else if (/がんばる|やる気|モチベ|全力/.test(t)) setStamp('ganbaru', 2500);
  else if (/行こ|レッツゴー|いっしょに冒険|出発|次は/.test(t)) setStamp('ikou', 2000);
  else if (/装備|ジョブ|PT|パーティ|強い|おすすめ|いいよ|使え/.test(t)) setStamp('iine', 2000);
  else if (/ちょっと|少し待|ロード|読み込み|処理中/.test(t)) setStamp('yasumi', 3000);
  else if (/配信終わり|ログアウト|落ちる|終わり|閉じ/.test(t)) setStamp('oyasumi', 3000);
}

function startTalking() {
  if (isTalking) return;
  isTalking = true; wrap.classList.add('talking'); setStamp('nani');
}
function stopTalking() {
  isTalking = false; wrap.classList.remove('talking');
  if (stampTimer) clearTimeout(stampTimer); stampTimer = null;
  mippiImg.src = '/mia/' + randomIdleStamp();
}

// ══════════════════════════════════════════════════
//  字幕テロップ（１文ずつ）
// ══════════════════════════════════════════════════
const telopBar   = document.getElementById('telop-bar');
const telopInner = document.getElementById('telop-inner');
let sentTimer = null, telopHideTimer = null;

function splitSentences(text){
  return text.replace(/([。！？\n])/g, '$1\x00').split('\x00')
             .map(s=>s.trim()).filter(s=>s.length>0);
}

function showTelop(text){
  const sents = splitSentences(text);
  if(!sents.length) return;
  if(sentTimer)     clearTimeout(sentTimer);
  if(telopHideTimer)clearTimeout(telopHideTimer);
  telopBar.classList.add('show');
  let idx = 0;
  function next(){
    if(idx >= sents.length){
      telopHideTimer = setTimeout(()=>telopBar.classList.remove('show'), 2000);
      return;
    }
    const s = sents[idx++];
    telopInner.classList.add('fade');
    setTimeout(()=>{
      telopInner.textContent = s;
      telopInner.classList.remove('fade');
      sentTimer = setTimeout(next, Math.max(2500, s.length * 130));
    }, 260);
  }
  next();
}

// ══════════════════════════════════════════════════
//  チャットパネル
// ══════════════════════════════════════════════════
const panel      = document.getElementById('panel');
const chatLog    = document.getElementById('chat-log');
const textInput  = document.getElementById('text-input');
const micBtn     = document.getElementById('mic-btn');
const micDot     = document.getElementById('mic-dot');
const acProgress = document.getElementById('auto-close-progress');
const memoArea   = document.getElementById('memo-area');
let panelOpen = false, acTimer = null;
const AC_MS = 20000;

// メモ保存/復元
memoArea.value = localStorage.getItem('mia_memo') || '';
memoArea.addEventListener('input', ()=>localStorage.setItem('mia_memo', memoArea.value));

function switchTab(name){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', (['chat','memo'])[i]===name));
  document.getElementById('tab-chat').classList.toggle('active', name==='chat');
  document.getElementById('tab-memo').classList.toggle('active', name==='memo');
}

function acBarStart(){
  acProgress.style.transition='none'; acProgress.style.transform='scaleX(1)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    acProgress.style.transition=`transform ${AC_MS}ms linear`;
    acProgress.style.transform='scaleX(0)';
  }));
}
function acBarStop(){
  acProgress.style.transition='none'; acProgress.style.transform='scaleX(1)';
}

function openPanel(){
  panelOpen=true; panel.classList.add('open'); resetAC();
}
function closePanel(){
  panelOpen=false; panel.classList.remove('open');
  if(acTimer){clearTimeout(acTimer); acTimer=null;} acBarStop();
}
function togglePanel(){ panelOpen ? closePanel() : openPanel(); }

function resetAC(){
  if(acTimer){clearTimeout(acTimer); acTimer=null;}
  if(!panelOpen) return;
  acBarStart();
  acTimer = setTimeout(closePanel, AC_MS);
}

textInput.addEventListener('input', ()=>{ if(panelOpen) resetAC(); });
panel.addEventListener('mouseenter', ()=>{ if(panelOpen){clearTimeout(acTimer); acBarStop();} });
panel.addEventListener('mouseleave', ()=>{ if(panelOpen) resetAC(); });

function addMsg(role, text){
  const d = document.createElement('div');
  d.className = role==='user' ? 'msg-user' : ('msg-mippi'+(text.includes('\n')?' diagram':''));
  d.textContent = text;
  chatLog.appendChild(d);
  if(chatLog.children.length>60) chatLog.removeChild(chatLog.firstChild);
  chatLog.scrollTop = chatLog.scrollHeight;
  if(!panelOpen) openPanel(); else resetAC();
}

function sendText(){
  const text = textInput.value.trim(); if(!text) return;
  if(!ws || ws.readyState!==WebSocket.OPEN){
    showTelop('サーバーに繋がってないで！012_start.bat を起動してな。'); return;
  }
  ws.send(JSON.stringify({cmd:'user_text', text}));
  textInput.value=''; resetAC();
}
textInput.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendText(); }
});

// ══════════════════════════════════════════════════
//  モード管理
// ══════════════════════════════════════════════════
let currentMode = 'chat';
let micActive   = false;
const waveform    = document.getElementById('waveform');
const voiceUi     = document.getElementById('voice-ui');
const bigMicBtn   = document.getElementById('big-mic-btn');
const bigMicIcon  = document.getElementById('big-mic-icon');
const bigMicLabel = document.getElementById('big-mic-label');
const bigWaveform = document.getElementById('big-waveform');
const voiceModeLabel = document.getElementById('voice-mode-label');

function setMode(mode){
  if(micActive) cancelMic();
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('mode-'+mode).classList.add('active');

  if(mode === 'chat'){
    // チャット：パネルそのまま、voice-ui非表示
    voiceUi.classList.remove('show');
    document.getElementById('input-area').style.display = 'flex';
    micBtn.style.display  = 'none';
    document.getElementById('send-btn').style.display = 'flex';
    waveform.classList.remove('show');
    openPanel();
  } else {
    // PTT / ボイス：voice-ui表示、パネル閉じる
    voiceUi.classList.add('show');
    closePanel();
    if(mode === 'ptt'){
      bigMicIcon.textContent  = '🎤';
      bigMicLabel.textContent = 'HOLD';
      voiceModeLabel.textContent = 'PTT MODE — 押してる間録音';
    } else {
      bigMicIcon.textContent  = '🎙️';
      bigMicLabel.textContent = 'TAP';
      voiceModeLabel.textContent = 'VOICE MODE — タップして話す';
    }
  }
  localStorage.setItem('mia_mode', mode);
}

function cancelMic(){
  if(!micActive) return;
  if(ws && ws.readyState===WebSocket.OPEN) ws.send(JSON.stringify({cmd:'mic_stop'}));
  micSetState('idle');
}

// ── マイク状態（小ボタン＋大ボタン共通） ──────────────────────
function micSetState(state){
  // 小ボタン（チャットパネル内）
  micBtn.classList.remove('recording','processing');
  micDot.classList.remove('recording');
  waveform.classList.remove('show','processing');
  // 大ボタン（voice-ui）
  bigMicBtn.classList.remove('recording','processing');
  bigWaveform.classList.remove('show','processing');

  if(state === 'recording'){
    micBtn.classList.add('recording');
    micDot.classList.add('recording');
    waveform.classList.add('show');
    bigMicBtn.classList.add('recording');
    bigWaveform.classList.add('show');
    bigMicLabel.textContent = currentMode==='ptt' ? 'REC...' : 'REC...';
    micActive = true;
  }
  if(state === 'processing'){
    micBtn.classList.add('processing');
    waveform.classList.add('show','processing');
    bigMicBtn.classList.add('processing');
    bigWaveform.classList.add('show','processing');
    bigMicLabel.textContent = '...';
    micActive = false;
  }
  if(state === 'idle'){
    bigMicLabel.textContent = currentMode==='ptt' ? 'HOLD' : 'TAP';
    micActive = false;
  }
}

// ── 大ボタン PTT ────────────────────────────────────────────
bigMicBtn.addEventListener('mousedown', e=>{
  e.preventDefault();
  if(currentMode !== 'ptt' || !ws || ws.readyState!==WebSocket.OPEN) return;
  micSetState('recording');
  ws.send(JSON.stringify({cmd:'mic_start'}));
});
document.addEventListener('mouseup', ()=>{
  if(currentMode !== 'ptt' || !micActive) return;
  if(!ws || ws.readyState!==WebSocket.OPEN){ micSetState('idle'); return; }
  ws.send(JSON.stringify({cmd:'mic_stop'}));
  micSetState('processing');
});

// ── 大ボタン ボイス（1クリック→VAD）─────────────────────────
bigMicBtn.addEventListener('click', e=>{
  if(currentMode !== 'voice') return;
  e.preventDefault();
  if(!ws || ws.readyState!==WebSocket.OPEN) return;
  if(micActive){ cancelMic(); return; }
  micSetState('recording');
  ws.send(JSON.stringify({cmd:'mic_start'}));
});

// 起動時にモード復元
(()=>{ const m = localStorage.getItem('mia_mode') || 'chat'; setMode(m); })();

// ══════════════════════════════════════════════════
//  WebSocket
// ══════════════════════════════════════════════════
let ws=null;
function connectWS(){
  ws = new WebSocket('ws://127.0.0.1:9012');
  ws.onopen  = ()=>{
    micDot.classList.add('active');
    const savedIdx = localStorage.getItem('mic_device_idx');
    if(savedIdx !== null) ws.send(JSON.stringify({cmd:'set_mic_device', index:parseInt(savedIdx)}));
  };
  ws.onclose = ()=>{ micDot.classList.remove('active','recording'); setTimeout(connectWS,3000); };
  ws.onerror = ()=>{};
  ws.onmessage = e=>{ try{ handleCmd(JSON.parse(e.data)); }catch{} };
}
function handleCmd(d){
  if(!d?.cmd) return;
  switch(d.cmd){
    case 'talkStart': startTalking(); break;
    case 'talkStop':  stopTalking(); break;
    case 'setStamp':  setStamp(d.key, d.duration||2500); break;
    case 'user_msg':  addMsg('user', d.text||''); break;
    case 'reply':
      if(d.text){ addMsg('mippi',d.text); showTelop(d.text);
        if(d.emotion) setStamp(d.emotion,3000); else autoStamp(d.text); }
      break;
    case 'mic_state':
      micSetState(d.state||'idle');
      break;
    case 'mic_transcribed':
      micSetState('idle');
      if(d.text){
        textInput.value = d.text;
        textInput.style.color = '#c8962a';
        setTimeout(()=>{ textInput.value=''; textInput.style.color=''; }, 1500);
      }
      break;
    case 'mic_devices':
      showMicDeviceMenu(d.devices, d.current);
      break;
  }
}
connectWS();

// ══════════════════════════════════════════════════
//  マイクデバイス選択
// ══════════════════════════════════════════════════
const micSelectBtn  = document.getElementById('mic-select-btn');
const micDeviceMenu = document.getElementById('mic-device-menu');
let micMenuOpen = false;

micSelectBtn.addEventListener('click', e=>{
  e.stopPropagation();
  if(micMenuOpen){
    micDeviceMenu.classList.remove('show'); micMenuOpen=false;
  } else {
    if(ws?.readyState===WebSocket.OPEN) ws.send(JSON.stringify({cmd:'get_mic_devices'}));
  }
});

document.addEventListener('click', ()=>{
  micDeviceMenu.classList.remove('show'); micMenuOpen=false;
});

function showMicDeviceMenu(devices, current){
  const savedIdx = localStorage.getItem('mic_device_idx');
  const activeIdx = current !== null && current !== undefined ? current
                  : (savedIdx !== null ? parseInt(savedIdx) : null);
  micDeviceMenu.innerHTML = '';

  // デフォルト項目
  const def = document.createElement('div');
  def.className = 'mic-device-item' + (activeIdx===null?' active':'');
  def.textContent = 'システムデフォルト';
  def.onclick = ()=>applyMicDevice(null);
  micDeviceMenu.appendChild(def);

  devices.forEach(dev=>{
    const item = document.createElement('div');
    item.className = 'mic-device-item' + (activeIdx===dev.index?' active':'');
    item.textContent = dev.name;
    item.title = `${dev.name} (${dev.rate}Hz)`;
    item.onclick = ()=>applyMicDevice(dev.index);
    micDeviceMenu.appendChild(item);
  });

  micDeviceMenu.classList.add('show'); micMenuOpen=true;
}

function applyMicDevice(idx){
  if(ws?.readyState===WebSocket.OPEN) ws.send(JSON.stringify({cmd:'set_mic_device', index:idx}));
  if(idx===null) localStorage.removeItem('mic_device_idx');
  else           localStorage.setItem('mic_device_idx', idx);
  micDeviceMenu.classList.remove('show'); micMenuOpen=false;
}

// ══════════════════════════════════════════════════
//  汎用ドラッグ・ズームユーティリティ
// ══════════════════════════════════════════════════
function makeDraggable(elem, handle, lsKey, defaultPos){
  const sx = parseFloat(localStorage.getItem(lsKey+'_x') ?? defaultPos.x);
  const sy = parseFloat(localStorage.getItem(lsKey+'_y') ?? defaultPos.y);
  elem.style.left = sx+'px'; elem.style.top = sy+'px';

  let drag=false, lx=0, ly=0;
  handle.addEventListener('mousedown', e=>{
    if(e.target.closest('#panel-close, #send-btn, #mic-btn, .tab-btn, #text-input, #memo-area')) return;
    drag=true; lx=e.clientX; ly=e.clientY;
    elem.style.transition='none'; e.preventDefault();
  });
  document.addEventListener('mousemove', e=>{
    if(!drag) return;
    const nx=elem.offsetLeft+(e.clientX-lx);
    const ny=elem.offsetTop +(e.clientY-ly);
    lx=e.clientX; ly=e.clientY;
    elem.style.left=nx+'px'; elem.style.top=ny+'px';
    localStorage.setItem(lsKey+'_x', nx); localStorage.setItem(lsKey+'_y', ny);
  });
  document.addEventListener('mouseup', ()=>{ drag=false; });
}

function makeZoomable(elem, lsKey, origin){
  let scale = parseFloat(localStorage.getItem(lsKey+'_z') ?? '1');
  elem.style.transformOrigin = origin;
  function apply(){ elem.style.transform=`scale(${scale})`; }
  apply();
  elem.addEventListener('wheel', e=>{
    e.preventDefault();
    scale = Math.min(3, Math.max(0.3, scale+(e.deltaY<0?0.05:-0.05)));
    apply(); localStorage.setItem(lsKey+'_z', scale);
  }, {passive:false});
}

// ── テロップ ─────────────────────────────────────
const telopW = window.innerWidth * 0.76;
makeDraggable(telopBar, document.getElementById('telop-grip'), 'telop', {
  x: (window.innerWidth - telopW)/2, y: window.innerHeight - 90

makeZoomable(telopBar, 'telop', 'top center');

// ── チャットパネル ────────────────────────────────
makeDraggable(panel, document.getElementById('panel-header'), 'panel', {
  x: 12, y: 60
});
makeZoomable(panel, 'panel', 'top left');

// ── ボイスUI ──────────────────────────────────────
const voiceGrip = document.getElementById('voice-grip');
makeDraggable(voiceUi, voiceGrip, 'voice_ui', {

// ══════════════════════════════════════════════════
//  ミア — ドラッグ(デスクトップ窓移動 or ブラウザ内移動) + ズーム + クリック
// ══════════════════════════════════════════════════
window._desktopMode = false;
const container    = document.getElementById('container');
const catArea      = document.getElementById('cat-area');
const mainArea     = document.getElementById('main-area');
const resizeHandle = document.getElementById('resize-handle');

makeZoomable(mainArea, 'mia', 'bottom center');
localStorage.removeItem('mia_cx'); localStorage.removeItem('mia_cy');

// ドラッグ vs クリック判定
let miaDragDist=0, miaDragLX=0, miaDragLY=0, miaDragging=false;

catArea.addEventListener('mousedown', e=>{
  miaDragging=true; miaDragDist=0;
  miaDragLX=e.screenX; miaDragLY=e.screenY;
  e.preventDefault();
});
document.addEventListener('mousemove', e=>{
  if(!miaDragging) return;
  const dx=e.screenX-miaDragLX, dy=e.screenY-miaDragLY;
  miaDragDist += Math.hypot(dx, dy);
  miaDragLX=e.screenX; miaDragLY=e.screenY;
  if(miaDragDist > 4){
    if(window._desktopMode && window.pywebview?.api?.move_delta){
      pywebview.api.move_delta(dx, dy);
    } else {
      // ブラウザモード: 初回ドラッグで bottom/right → left/top に切り替え
      if(!container.style.left || container.style.left === 'auto'){
        const r = container.getBoundingClientRect();
        container.style.bottom = 'auto'; container.style.right = 'auto';
        container.style.left = r.left+'px'; container.style.top = r.top+'px';
      }
      const nx = container.offsetLeft + dx;
      const ny = container.offsetTop  + dy;
      container.style.left = nx+'px'; container.style.top = ny+'px';
      localStorage.setItem('mia_cx', nx); localStorage.setItem('mia_cy', ny);
    }
  }
});
document.addEventListener('mouseup', e=>{
  if(!miaDragging) return;
  miaDragging=false;
  if(miaDragDist <= 4) togglePanel();
});

// リサイズハンドル（コンテナ幅）
let resizing=false, rStartX=0, rStartW=0;
const MIN_W=200, MAX_W=500;
container.style.width = (parseInt(localStorage.getItem('mia_w')||'280'))+'px';
resizeHandle.addEventListener('mousedown', e=>{
  resizing=true; rStartX=e.clientX; rStartW=container.offsetWidth;
  document.body.style.cursor='ew-resize'; e.preventDefault(); e.stopPropagation();
});
document.addEventListener('mousemove', e=>{
  if(!resizing) return;
  container.style.width=Math.min(MAX_W,Math.max(MIN_W,rStartW+(rStartX-e.clientX)))+'px';
});
document.addEventListener('mouseup', ()=>{
  if(!resizing) return;
  resizing=false; document.body.style.cursor='';
  localStorage.setItem('mia_w', container.offsetWidth);
  updateClickthroughRects();
});

// ══════════════════════════════════════════════════
//  デスクトップモード — クリックスルー領域通知
// ══════════════════════════════════════════════════
function updateClickthroughRects() {
  if (!window._desktopMode || !window.pywebview?.api?.update_rects) return;
  const wx = window.screenLeft ?? window.screenX ?? 0;
  const wy = window.screenTop  ?? window.screenY ?? 0;
  const ids = ['container', 'panel', 'telop-bar', 'voice-ui'];
  const rects = [];
  for (const id of ids) {
    const el = document.getElementById(id);
    if (!el) continue;
    const st = window.getComputedStyle(el);
    if (st.display === 'none' || st.visibility === 'hidden') continue;
    const r = el.getBoundingClientRect();
    if (r.width < 1 || r.height < 1) continue;
    rects.push({
      l: Math.floor(wx + r.left),
      t: Math.floor(wy + r.top),
      r: Math.ceil(wx + r.right),
      b: Math.ceil(wy + r.bottom)
    });
  }
  window.pywebview.api.update_rects(JSON.stringify(rects));
}

// 300ms ごとに更新（ドラッグ中もリアルタイムに追従）
setInterval(updateClickthroughRects, 300);
